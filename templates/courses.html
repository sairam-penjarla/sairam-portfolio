<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom configuration for Tailwind colors and font */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'text-primary': '#1e1e1e',
                        'body-bg': '#f4f6f8', /* Light grey body background */
                        'primary': '#2267af', /* Main accent color (Blue) */
                        'secondary': '#4CAF50', /* Secondary color (Green) for buttons */
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </style>
    <!-- Load Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<!-- Apply the new light grey background -->
<body class="bg-[#f4f6f8] min-h-screen font-sans antialiased flex flex-col">
    <!-- Headeer -->
    {% include 'common/header.html' %}
    <main class="max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex-grow">
        
        <!-- Main Heading (Dynamic Course Name) -->
        <h1 id="main-title" class="text-6xl sm:text-7xl lg:text-8xl font-bold leading-snug mb-8 mt-6 md:mt-10 text-primary italic" style="font-family: serif">
            Loading Course...
        </h1>

        <!-- Course Detail View (The fixed content area) -->
        <div id="course-detail-view" class="pb-16">
            
            <!-- Breadcrumbs -->
            <div id="course-detail-header" class="mb-10 border-b border-gray-300 pb-3">
                <!-- Breadcrumbs injected here -->
            </div>

            <!-- Course Modules List -->
            <div id="course-modules" class="space-y-6">
                <!-- Dynamic module content injected here -->
            </div>
        </div>
        
    </main>
    <!-- Footer -->
    {% include 'common/footer.html' %}
    <script>
        // --- DATA STRUCTURES ---

        // NEW: Course Detail Data (Modules and Resources)
        // Removed allCourseData as it is no longer necessary for this single-view page.
        const courseDetails = {{ course | safe }};
        
        console.log(courseDetails)
        
        

        // --- GLOBAL ELEMENTS & CONSTANTS ---
        const mainTitleElement = document.getElementById('main-title');
        const modulesContainer = document.getElementById('course-modules');
        const detailHeader = document.getElementById('course-detail-header');
        
        // Define the course to be loaded by default
        const defaultCourseTitle = "{{ var1 | default('') }}";

        /**
         * Renders the full Course Detail View for a given course title.
         * @param {string} courseTitle - The title of the course to display details for.
         */
        function initCourseDetailView(courseTitle) {
            const detailData = courseDetails[courseTitle];
            // Removed courseMeta lookup

            if (!detailData) {
                mainTitleElement.innerHTML = "Error: Course Not Found";
                modulesContainer.innerHTML = '<p class="text-center text-xl text-red-500 my-16">Details for this course are currently unavailable.</p>';
                return;
            }

            // 1. Update main heading to course title
            mainTitleElement.innerHTML = courseTitle;

            // 2. Render Breadcrumbs
            const coursesURL = {{ course_url | tojson }};
            detailHeader.innerHTML = `
                <div id="breadcrumbs" class="text-gray-500 text-sm sm:text-base font-medium">
                    <a href="${coursesURL}" class="text-primary hover:text-primary/80 transition duration-150">Learn Hub</a> 
                    <span class="mx-1">></span> 
                    <span class="text-gray-900 font-semibold">${courseTitle}</span>
                </div>
            `;


            // 3. Render Modules and Resources
            const modulesHtml = detailData.modules.map((module, index) => `
                    <div class="bg-white p-6 sm:p-8 rounded-xl transition-all duration-300 border border-gray-200">
                        
                        <!-- Module Title and Learn Button Row -->
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4">
                            <h3 class="text-2xl font-extrabold text-text-primary">
                                ${module.name}
                            </h3>
                            <a href="${module.url}/${module.module}" 
                            class="mt-3 sm:mt-0 bg-[#2267af] hover:bg-primary/90 text-white font-bold py-2 px-6 rounded-lg transition duration-300 shadow-lg hover:shadow-xl text-sm">
                                Learn
                            </a>
                        </div>
                        
                        <!-- Resources List -->
                        <div class="space-y-4">
                            <p class="text-base font-semibold text-gray-700">Available Resources:</p>
                            <ul class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${module.resources.map(resource => `
                                    <li class="w-full">
                                        <a href="${resource.url}" target="_blank" 
                                        class="flex items-center space-x-3 p-3 w-full h-full bg-[#f8f8fa] rounded-lg border border-gray-100 hover:border-primary/50 transition duration-150 group"
                                        >
                                            ${resource.type === "video" 
                                                ? `
                                                <!-- YouTube Icon -->
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-red-500 flex-shrink-0">
                                                    <path d="M2.5 17a24.12 24.12 0 0 1 0-10A2 2 0 0 1 3.9 5.6a49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17" />
                                                    <path d="m10 15 5-3-5-3z" />
                                                </svg>
                                                `
                                                : `
                                                <!-- Web Icon -->
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary flex-shrink-0">
                                                    <circle cx="12" cy="12" r="10"/>
                                                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                                                    <path d="M2 12h20"/>
                                                </svg>
                                                `
                                            }
                                            <span class="text-gray-700 group-hover:text-primary transition duration-150 text-base font-medium truncate">
                                                ${resource.name}
                                            </span>
                                        </a>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `).join('');


            modulesContainer.innerHTML = modulesHtml;
        }

        // --- Initial Setup ---
        
        document.addEventListener('DOMContentLoaded', () => {
            // Load the default course detail view on page load
            initCourseDetailView(defaultCourseTitle);
        });

    </script>
</body>
</html>
