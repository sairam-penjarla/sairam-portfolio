<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery with Modal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .icon-btn {
        @apply bg-white rounded-full p-2 shadow transition-transform duration-300 ease-in-out;
    }
    .icon-btn:hover {
        @apply scale-110;
    }
</style>
</head>
<body class="flex flex-col items-center justify-start gap-10 py-10 bg-white">

<!-- Single Image Container -->
<div class="max-w-[800px] w-full relative group rounded-md overflow-hidden">
    <img src="https://iamsairamstrprd.blob.core.windows.net/static/images/thumbnails/img_11.jpg" alt="Single Image" class="w-full h-full object-cover rounded-md cursor-pointer" onclick="openModal(this.src)">
    <button onclick="openModal(this.previousElementSibling.src)" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize2-icon text-gray-700"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg>
    </button>
    <button onclick="downloadImage(this.previousElementSibling.previousElementSibling.src)" class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-down-to-line-icon text-blue-600"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
    </button>
</div>

<!-- 4x4 Grid Container -->
<div class="max-w-[800px] w-full grid grid-cols-2 sm:grid-cols-4 gap-2">
    <template id="grid-template">
        <div class="relative group rounded-md overflow-hidden">
            <img src="https://iamsairamstrprd.blob.core.windows.net/static/images/thumbnails/img_11.jpg" class="w-full h-full object-cover rounded-md cursor-pointer" onclick="openModal(this.src)">
            <button onclick="openModal(this.previousElementSibling.src)" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize2-icon text-gray-700"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg>
            </button>
            <button onclick="downloadImage(this.previousElementSibling.previousElementSibling.src)" class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-down-to-line-icon text-blue-600"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
            </button>
        </div>
    </template>
</div>

<!-- Fullscreen Modal -->
<div id="fullscreenModal" class="fixed inset-0 bg-black bg-opacity-95 hidden items-center justify-center z-50">
    <img id="modalImage" class="max-w-full max-h-full object-contain rounded-md">
    <button id="modalDownload" class="absolute top-5 right-5 icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-down-to-line-icon text-blue-600"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
    </button>
</div>

<script>
    const gridContainer = document.querySelector('.grid');
    const template = document.getElementById('grid-template').content;
    for(let i=0;i<16;i++) {
        gridContainer.appendChild(template.cloneNode(true));
    }

    const modal = document.getElementById('fullscreenModal');
    const modalImage = document.getElementById('modalImage');
    const modalDownload = document.getElementById('modalDownload');

    function downloadImage(url) {
        const a = document.createElement('a');
        a.href = url;
        a.download = url.split('/').pop();
        a.click();
    }

    function openModal(url) {
        modalImage.src = url;
        modalDownload.onclick = () => downloadImage(url);
        modal.classList.remove('hidden');
    }

    modal.addEventListener('click', (e) => {
        if(e.target === modal) modal.classList.add('hidden');
    });
</script>

</body>
</html>
